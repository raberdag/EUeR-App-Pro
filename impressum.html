<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum – EÜR-App Pro</title>
  <style>
    body {
      background-color: #1a1a2e;
      color: #e8e8f0;
      text-align: center;
      padding: 40px 20px;
      font-family: 'Segoe UI', sans-serif;
    }
    h1 {
      color: #e07b2a;
      font-size: 1.8rem;
      margin-bottom: 2rem;
    }
    img {
      max-width: 90%;
      height: auto;
      border: 2px solid #e07b2a;
      border-radius: 8px;
      margin-bottom: 30px;
    }
    @media (min-width: 768px) {
      img { max-width: 50%; }
    }
    .back-button {
      display: inline-block;
      padding: 12px 25px;
      background-color: #e07b2a;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .back-button:hover { background-color: #f0a050; }
  </style>
</head>
<body>
  <h1>✈ EÜR-App Pro</h1>
  <img src="impressum.jpg" alt="Impressum" />
